    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | By Abhay Shihora</title>

    <meta name="author" content="Abhay Shihora">
    <meta name="description" content="A premium real-time weather application developed by Abhay Shihora.">

    <style>
        :root {
            --primary: #ff9800;
            --accent: #764ba2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: #333;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { color: white; text-align: center; margin-bottom: 5px; font-size: 2.5rem; }

        .dev-badge {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* FAVORITES SECTION */
        #pinnedSection h3 {
            color: white;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .pinned-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .city-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .city-card:hover { transform: translateY(-5px); }

        .btn-remove {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-remove:hover { background: white; color: var(--accent); }

        /* SEARCH BOX */
        .search-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        input {
            padding: 14px 20px;
            width: 70%;
            border-radius: 30px;
            border: 1px solid #eee;
            outline: none;
            font-size: 1rem;
            background: #f9f9f9;
        }

        .btn-search {
            padding: 14px 25px;
            border: none;
            background: var(--accent);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-search:hover { opacity: 0.9; transform: scale(1.05); }

        /* WEATHER RESULT */
        .temp-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 10px 0;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .btn-pin {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }

        .empty-slot {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            padding-bottom: 20px;
        }

        footer strong { color: white; border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌦 Weather Dashboard</h1>
        <span class="dev-badge">DESIGNED BY ABHAY SHIHORA</span>

        <div id="pinnedSection">
            <h3>📍 Favorites (Max 3)</h3>
            <div class="pinned-container" id="pinnedCities">
                </div>
        </div>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="city" placeholder="Enter city name...">
                <button class="btn-search" onclick="getWeather()">Search</button>
            </div>

            <div class="weather-display" id="weatherResult">
                <p style="color: #999;">Find the current forecast for any city</p>
            </div>

            <button class="btn-pin" id="pinBtn" style="display:none;" onclick="pinCity()">📌 Pin to Favorites</button>
        </div>

        <footer>
            <p>&copy; 2026 Weather Dashboard | Crafted by <strong>Abhay Shihora</strong></p>
        </footer>
    </div>

<script>
    // Console Signature
    console.log("%c🚀 Weather App Developed by Abhay Shihora", "color: #ff9800; font-size: 20px; font-weight: bold;");

    const apiKey = "18e0328eb3384402bc0123257262203";
    let currentCityData = null;

    function getWeather() {
        const city = document.getElementById("city").value;
        if(!city) return;

        fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) throw new Error();
            currentCityData = data;
            
            document.getElementById("weatherResult").innerHTML = `
                <h2 style="color: #444; margin-bottom: 0;">${data.location.name}, ${data.location.country}</h2>
                <div class="temp-display">${data.current.temp_c}°C</div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img src="${data.current.condition.icon}" width="60">
                    <p style="color: #666; font-weight: 600; text-transform: capitalize; margin: 0;">
                        ${data.current.condition.text}
                    </p>
                </div>
            `;
            document.getElementById("pinBtn").style.display = "inline-block";
        })
        .catch(() => alert("City not found! Please check the spelling."));
    }

    function pinCity() {
        if (!currentCityData) return;
        let pinned = JSON.parse(localStorage.getItem("pinnedCities")) || [];

        if (pinned.find(c => c.location.name.toLowerCase() === currentCityData.location.name.toLowerCase())) {
            alert("This city is already in your favorites!");
            return;
        }

        if (pinned.length >= 3) {
            alert("Maximum 3 favorites allowed! Remove one to add a new one.");
            return;
        }

        pinned.push(currentCityData);
        localStorage.setItem("pinnedCities", JSON.stringify(pinned));
        displayPinned();
    }

    function removeCity(index) {
        let pinned = JSON.parse(localStorage.getItem("pinnedCities")) || [];
        pinned.splice(index, 1);
        localStorage.setItem("pinnedCities", JSON.stringify(pinned));
        displayPinned();
    }

    function displayPinned() {
        let pinned = JSON.parse(localStorage.getItem("pinnedCities")) || [];
        let html = "";

        for(let i=0; i<3; i++) {
            if(pinned[i]) {
                html += `
                    <div class="city-card">
                        <div style="font-weight: bold; font-size: 0.9rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                            ${pinned[i].location.name}
                        </div>
                        <div style="font-size: 1.4rem; font-weight: 800; margin: 5px 0; color: #ff9800;">
                            ${pinned[i].current.temp_c}°C
                        </div>
                        <div style="font-size: 0.7rem; opacity: 0.9; margin-bottom: 5px;">
                            ${pinned[i].current.condition.text}
                        </div>
                        <button class="btn-remove" onclick="removeCity(${i})">✕ Remove</button>
                    </div>
                `;
            } else {
                html += `<div class="empty-slot">Available Slot</div>`;
            }
        }
        document.getElementById("pinnedCities").innerHTML = html;
    }

    // Support Enter Key
    document.getElementById("city").addEventListener("keypress", (e) => {
        if (e.key === "Enter") getWeather();
    });

    displayPinned();
</script>

</body>
</html>
